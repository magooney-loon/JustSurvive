<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JustSurvive</title>
		<link rel="stylesheet" href="/css/rpgui.css" />
		<script src="/css/rpgui.js"></script>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body,
			#app {
				width: 100%;
				height: 100%;
				overflow: hidden;
				cursor: crosshair;
				user-select: none;
				-webkit-user-select: none;
				-moz-user-select: none;
				-ms-user-select: none;
				-webkit-user-drag: none;
				user-drag: none;
			}
			img,
			canvas,
			svg {
				user-select: none;
				-webkit-user-drag: none;
			}
		</style>
	</head>
	<body oncontextmenu="return false;">
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
